<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job & Scholarship Agent{% endblock %}</title>
    <!-- Add SEO Meta Tags -->
    <meta name="description"
        content="{% block meta_desc %}Find the latest automated jobs and fully funded scholarships in Pakistan.{% endblock %}">

    <!-- Tailwind CSS for fast Styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- JSON-LD SEO Schema block -->
    {% block json_ld %}{% endblock %}

    <!-- Google AdSense Code Placeholder -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->
</head>

<body class="bg-gray-50 flex flex-col min-h-screen text-gray-800 font-sans">

    <!-- Top Ad Banner Placeholder -->
    <div class="w-full text-center p-2">
        <!-- Paste your AdSense top banner code here -->
        <div class="h-auto max-w-4xl mx-auto">
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight">PkOpportunity<span
                    class="text-yellow-400">Agent</span></a>
            <div class="space-x-4">
                <a href="/" class="hover:text-yellow-300 transition">Jobs</a>
                <a href="/scholarships" class="hover:text-yellow-300 transition">Scholarships</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto p-4 flex-grow flex gap-6 mt-6">

        <!-- Left Sidebar Ad -->
        <aside class="w-1/6 hidden lg:block">
            <!-- Paste your AdSense left sidebar code here -->
            <div class="h-auto sticky top-24">
            </div>
        </aside>

        <!-- Dynamic Content -->
        <section class="w-full lg:w-4/6">
            {% block content %}{% endblock %}
        </section>

        <!-- Right Sidebar Ad -->
        <aside class="w-1/6 hidden lg:block">
            <!-- Paste your AdSense right sidebar code here -->
            <div class="h-auto sticky top-24">
            </div>
        </aside>

    </main>

    <!-- Bottom Ad Banner Placeholder -->
    <div class="w-full text-center p-4 mt-8 border-t border-gray-200">
        <!-- Paste your AdSense bottom banner code here -->
        <div class="h-auto max-w-4xl mx-auto">
        </div>
    </div>

    <footer class="bg-gray-800 text-gray-300 p-6 text-center shadow-inner mt-auto">
        <p>&copy; 2026 Job & Scholarship Agent. Automatically Aggregated.</p>
        <p class="text-sm mt-2 text-gray-500">Built using Groq AI and BeautifulSoup</p>
    </footer>
</body>

</html>
